name: manylinux-wheels

on:
  workflow_dispatch:

jobs:

  build_linux_compat:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-20.04]
        python-version: ["3.8","3.9","3.10","3.11","3.12","3.13","3.14"]
        compiler: ["clang-12"]

    runs-on: ${{ matrix.platform }}

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ubuntu dependencies
        env:
          COMPILER: ${{ matrix.compiler }}
        run: bash $GITHUB_WORKSPACE/.github/install_ubuntu_dependencies.sh

      - name: Add python requirements
        run: |
          python -m pip install --upgrade wheel setuptools
          python -m pip install -r requirements.txt

      - name: Install audit tools
        run: pip install patchelf auditwheel

      - name: Create build directory and run CMake
        run: |
          cmake -S . \
            -B build \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DPIP_INSTALL=True \
            -DBUILD_ASSET_WHEEL=True

      - name: Build Project
        run: |
          cmake --build build \
            --target asset pypiwheel \
            --config Release \
            -- -j2

      - name: Audit Wheel Test
        run: |
          auditwheel show build/asset_asrl/dist/*.whl

      - name: Audit Wheel Repair
        run: |
          auditwheel repair \
            --plat manylinux_2_31_x86_64 \
            build/asset_asrl/dist/*.whl

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: dist_${{ matrix.python-version }}_${{ matrix.platform }}
          path: wheelhouse/*.whl
          retention-days: 5


  upload:
    needs: [build_linux_compat]

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - uses: actions/download-artifact@v4
        with:
          path: dists/

      - run: mkdir wheels

      - name: Copy to Target
        run: cp -r dists/dist_*/. wheels/

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: wheels/

      - name: Upload Wheels To GitHub
        uses: actions/upload-artifact@v4
        with:
          name: All Wheels
          path: wheels/
          retention-days: 5